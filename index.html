<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="content-type" content="text/html; charset=utf-8" />
		<title>Quiz App Project</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="main.css"/>
	</head>
	<body>
	
<div class="container">
	<div class="start-screen">
			<h1 class="heading">Quiz App</h1>
			<div class="setting">
				<label for="numOquestions">Number of Questions</label>
				<select name="" id="num-questions">
					<option value="5">5</option>
					<option value="10">10</option>
					<option value="15">15</option>
					<option value="20">20</option>
					<option value="25">25</option>
					<option value="30">30</option>
				</select>
				
				
				<label for="category">Select Category</label>
				<select name="" id="category">
					<option value="">Any Category</option>
					<option value="9">general Knowledge</option>
					<option value="10">books</option>
					<option value="11">films</option>
					<option value="12">music</option>
					<option value="14">television</option>
					<option value="15">video games</option>
					<option value="16">bord games</option>
					<option value="17">sciense and Nature</option>
					<option value="18">computer</option>
					<option value="19">mathmetics</option>
					<option value="20">mythology</option>
					<option value="21">sports</option>
					<option value="22">geography</option>
					<option value="23">history</option>
					<option value="24">politics</option>
					<option value="25">art</option>
				</select>
				
				
				<label for="difficulty">Select Difficulty</label>
				<select name="" id="difficulty">
					<option value="">Any Difficulty</option>
					<option value="easy">Easy</option>
					<option value="medium">Medium</option>
					<option value="hard">Hard</option>
				</select>
				
				
				<label for="time">select time per question</label>
				<select name="" id="time">
					<option value="60">60 seconds</option>
					<option value="30">30 seconds</option>
					<option value="25">25 seconds</option>
					<option value="20">20 seconds</option>
					<option value="15">15 seconds</option>
				</select>
			</div>
			<button type="button" class="btn start">Start Quiz</button>
		</div>
	
	<div class="quiz hide">
		<div class="timer">
			<div class="progress">
				<div class="progress-bar"></div>
				<span class="progress-text"></span>
				</div>
		</div>
		<div class="question-wrapper">
			<div class="number">
			Question <span class="current">1</span> <span class="total">/10</span>
			</div>
		 <div class="question">This is a Question</div>
		<div class="answer-wrapper">
			<!--
			<div class="answer selected">
				<span class="text">answer</span>
				<span class="checkbox">
					<span class="icon">&checkmark;</span> 
				</span>
			</div>
			<div class="answer correct">
				<span class="text">answer</span>
				<span class="checkbox">
					<span class="icon">&checkmark;</span> 
				</span>
			</div>
			<div class="answer wrong">
				<span class="text">answer</span>
				<span class="checkbox">
					<span class="icon">&checkmark;</span> 
				</span>
			</div>
			-->
		</div>
		
		<button class="btn submit" disabled="true">submit</button>
		<button class="btn next">next</button>
			</div>
		</div>
<div class="end-screen hide">
	<h1 class="heading">Quiz App</h1>
	<div class="score">
		<span class="score-text">Your Score:</span>
		<div>
		<div class="final-score">0</div>
		<div class="total-score">/10</div>
	</div>
</div>
	</div>
	<button class="btn restart">Restart Quiz</button>
</div>


	<script src="main.js" type="text/javascript" charset="utf-8"></script>
	</body>
</html>
